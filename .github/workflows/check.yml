name: "代码质量检查"

on:
  pull_request:
  push:
    branches: [main, dev]

concurrency:
  group: check-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-22.04
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.cargo/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rustfmt.toml'
              - '.github/workflows/check.yml'
            frontend:
              - 'frontend/**'
              - 'scripts/**'
              - 'frontend/package.json'
              - 'frontend/pnpm-lock.yaml'
              - 'frontend/vite.config.ts'
              - 'frontend/tsconfig*.json'
              - 'frontend/index.html'
              - '.oxlintrc.json'
              - '.oxfmtrc.json'
              - '.github/workflows/check.yml'

  backend:
    name: 后端检查 (Rust)
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-22.04
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf nasm

      - name: 安装 Rust 工具链
        id: rust_setup
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy
        continue-on-error: true

      - name: 重试安装 Rust 工具链
        if: ${{ steps.rust_setup.outcome == 'failure' }}
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: 缓存 Rust 编译产物
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: 检查代码格式 (Rust)
        run: cargo fmt --all -- --check

      - name: 运行 Clippy 检查
        run: cargo clippy --workspace -- -D warnings

      - name: 运行后端测试
        run: cargo test --workspace

  frontend:
    name: 前端检查 (Node)
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-22.04
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Prepare PNPM (固定版本)
        run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate

      - name: 缓存 pnpm 依赖
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: 安装前端依赖
        run: |
          pnpm --dir frontend install --frozen-lockfile

      - name: 运行格式化并检查前端 Lint
        run: |
          pnpm --dir frontend run fmt:check && pnpm --dir frontend run lint

      - name: 检查前端构建
        run: pnpm --dir frontend run build
