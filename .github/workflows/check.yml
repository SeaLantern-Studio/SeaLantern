name: "代码质量检查"

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: check-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-22.04
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      backend-core: ${{ steps.filter.outputs['backend-core'] }}
      backend-infra: ${{ steps.filter.outputs['backend-infra'] }}
      backend-extra: ${{ steps.filter.outputs['backend-extra'] }}
      backend-server: ${{ steps.filter.outputs['backend-server'] }}
      backend-tauri: ${{ steps.filter.outputs['backend-tauri'] }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'crates/**'
              - 'server/**'
              - 'src-tauri/**'
              - '.cargo/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rustfmt.toml'
              - '.github/workflows/check.yml'
            backend-core:
              - 'crates/core/**'
              - '.cargo/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rustfmt.toml'
              - '.github/workflows/check.yml'
            backend-infra:
              - 'crates/infra/**'
              - '.cargo/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rustfmt.toml'
              - '.github/workflows/check.yml'
            backend-extra:
              - 'crates/extra/**'
              - '.cargo/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rustfmt.toml'
              - '.github/workflows/check.yml'
            backend-server:
              - 'server/**'
              - '.cargo/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rustfmt.toml'
              - '.github/workflows/check.yml'
            backend-tauri:
              - 'src-tauri/**'
              - '.cargo/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rustfmt.toml'
              - '.github/workflows/check.yml'
            frontend:
              - 'src/**'
              - 'scripts/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'vite.config.ts'
              - 'tsconfig*.json'
              - 'index.html'
              - '.oxlintrc.json'
              - '.oxfmtrc.json'
              - '.github/workflows/check.yml'

  backend-lint:
    name: 后端代码规范 (fmt + clippy)
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf nasm

      - name: 安装 Rust 工具链
        id: rust_setup
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy
        continue-on-error: true

      - name: 重试安装 Rust 工具链
        if: ${{ steps.rust_setup.outcome == 'failure' }}
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: 缓存 Rust 编译产物
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: 检查代码格式 (Rust)
        run: cargo fmt --all -- --check

      - name: 运行 Clippy 检查
        run: cargo clippy --workspace -- -D warnings

  backend-test-core:
    name: 后端测试 (core)
    needs: [changes, backend-lint]
    if: ${{ needs.changes.outputs['backend-core'] == 'true' }}
    runs-on: ubuntu-22.04
    timeout-minutes: 4
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: 运行测试
        run: cargo test -p sealantern-core --lib

  backend-test-infra:
    name: 后端测试 (infra)
    needs: [changes, backend-lint]
    if: ${{ needs.changes.outputs['backend-infra'] == 'true' }}
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: 运行测试
        run: cargo test -p sealantern-infra --all-features

  backend-test-server:
    name: 后端测试 (server)
    needs: [changes, backend-lint]
    if: ${{ needs.changes.outputs['backend-server'] == 'true' }}
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: 运行测试
        run: cargo test -p sealantern-server

  backend-test-extra:
    name: 后端测试 (extra)
    needs: [changes, backend-lint]
    if: ${{ needs.changes.outputs['backend-extra'] == 'true' }}
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: 运行测试
        run: cargo test -p sealantern-extra

  backend-test-tauri:
    name: 后端测试 (tauri)
    needs: [changes, backend-lint]
    if: ${{ needs.changes.outputs['backend-tauri'] == 'true' }}
    runs-on: ubuntu-22.04
    timeout-minutes: 6
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf nasm

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: 缓存 Rust 编译产物（只恢复）
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          save-if: false

      - name: 运行测试
        run: cargo test --lib -p sea-lantern

  backend:
    name: 后端检查 (Rust)
    needs: [backend-lint, backend-test-core, backend-test-infra, backend-test-server, backend-test-extra, backend-test-tauri]
    if: always()
    runs-on: ubuntu-22.04
    steps:
      - name: 汇总后端检查状态
        run: |
          failed=""
          if [[ "${{ needs.backend-lint.result }}" == "failure" ]]; then failed="$failed lint"; fi
          if [[ "${{ needs.backend-test-core.result }}" == "failure" ]]; then failed="$failed core"; fi
          if [[ "${{ needs.backend-test-infra.result }}" == "failure" ]]; then failed="$failed infra"; fi
          if [[ "${{ needs.backend-test-server.result }}" == "failure" ]]; then failed="$failed server"; fi
          if [[ "${{ needs.backend-test-extra.result }}" == "failure" ]]; then failed="$failed extra"; fi
          if [[ "${{ needs.backend-test-tauri.result }}" == "failure" ]]; then failed="$failed tauri"; fi
          if [[ -n "$failed" ]]; then
            echo "::error ::后端检查失败，以下模块未通过：$failed"
            exit 1
          else
            echo "所有后端模块检查通过！"
          fi

  frontend:
    name: 前端检查 (Node)
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-22.04
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Prepare PNPM (固定版本)
        run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate

      - name: 缓存 pnpm 依赖
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: 安装前端依赖
        run: |
          pnpm install --frozen-lockfile

      - name: 运行格式化并检查前端 Lint
        run: pnpm run fmt:check && pnpm run lint

