name: 要求至少一个 accepted 的 Issue

on:
  pull_request:
    types: [opened, reopened, synchronize, edited]

concurrency:
  group: issue-check-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  pull-requests: read
  issues: read

jobs:
  check-linked-issue:
    runs-on: ubuntu-22.04
    steps:
      - name: 必须关联 accepted Issue
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;
            const pr = context.payload.pull_request;

            const exemptLabels = new Set([
              "ci",
              "dependencies",
              "docs",
              "release",
              "skip-issue-check"
            ]);

            const prLabels = new Set((pr.labels || []).map(label => label.name.trim().toLowerCase()));
            if ([...prLabels].some(label => exemptLabels.has(label))) {
              core.info("✅ PR 命中 issue 检查豁免标签");
              return;
            }

            // 使用 closing keyword 关联 issue；豁免标签用于降低维护类 PR 的阻力
            const query = `
              query($owner:String!, $repo:String!, $number:Int!) {
                repository(owner:$owner, name:$repo) {
                  pullRequest(number:$number) {
                    closingIssuesReferences(first: 50) {
                      nodes {
                        number
                        state
                        labels(first: 50) {
                          nodes { name }
                        }
                        repository {
                          nameWithOwner
                        }
                      }
                    }
                  }
                }
              }
            `;

            const result = await github.graphql(query, {
              owner,
              repo,
              number: prNumber
            });

            const prNode = result.repository.pullRequest;
            const repoFull = `${owner}/${repo}`.toLowerCase();

            const issues = (prNode.closingIssuesReferences.nodes || [])
              .filter(i => `${i.repository.nameWithOwner}`.toLowerCase() === repoFull);

            if (issues.length === 0) {
              core.setFailed("❌ PR 必须关联至少一个 Issue");
              return;
            }

            const valid = issues.some(issue => {
              const hasAccepted = issue.labels.nodes.some(
                l => l.name.trim().toLowerCase() === "accepted"
              );
              return issue.state === "OPEN" && hasAccepted;
            });

            if (!valid) {
              core.setFailed("❌ 关联的 Issue 中，没有一个是 OPEN 且包含 'accepted' 标签");
            } else {
              core.info("✅ 存在符合条件的关联 Issue");
            }
