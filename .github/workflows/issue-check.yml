name: 检查 PR 关联的 Issue

on:
  pull_request:
    types: [opened, reopened, synchronize, edited]

permissions:
  pull-requests: read
  issues: read

jobs:
  check-linked-issue:
    runs-on: ubuntu-22.04
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'internal') }}
    steps:
      - name: 检查是否关联 Issue
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;

            const query = `
              query($owner:String!, $repo:String!, $number:Int!) {
                repository(owner:$owner, name:$repo) {
                  pullRequest(number:$number) {
                    closingIssuesReferences(first: 50) {
                      nodes {
                        number
                        state
                        repository {
                          nameWithOwner
                        }
                      }
                    }
                  }
                }
              }
            `;

            const result = await github.graphql(query, {
              owner,
              repo,
              number: prNumber
            });

            const prNode = result.repository.pullRequest;
            const repoFull = `${owner}/${repo}`.toLowerCase();

            const issues = (prNode.closingIssuesReferences.nodes || [])
              .filter(i => `${i.repository.nameWithOwner}`.toLowerCase() === repoFull);

            if (issues.length === 0) {
              core.setFailed("PR 必须关联至少一个 Issue");
              return;
            }

            core.info(`已关联 ${issues.length} 个 Issue`);
