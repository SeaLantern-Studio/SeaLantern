name: "发布"

on:
  push:
    tags:
      - "v*"
      - "sea-lantern-v*"

permissions:
  contents: write

jobs:
  validate-tag:
    name: 校验 Tag 来源并提取版本
    runs-on: ubuntu-22.04
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 校验 Tag 指向 main 分支提交
        run: |
          set -euo pipefail
          git fetch origin main --no-tags
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "❌ 当前 tag (${GITHUB_REF_NAME}) 对应提交不在 main 分支上"
            exit 1
          fi
          echo "✅ Tag 来源校验通过"

      - name: 提取版本信息
        id: meta
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="$(echo "$TAG" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -n 1)"
          if [ -z "$VERSION" ]; then
            echo "❌ 无法从 tag 提取版本号: $TAG"
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "✅ 发布版本: $VERSION"

  publish-tauri:
    name: 构建并发布桌面端
    needs: validate-tag
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
          - platform: "macos-latest"
            args: "--target x86_64-apple-darwin"
          - platform: "ubuntu-22.04"
            args: ""
            arch: "amd64"
          - platform: "ubuntu-22.04-arm"
            args: ""
            arch: "arm64"
          - platform: "windows-latest"
            args: ""
            arch: "amd64"
          - platform: "windows-11-arm"
            args: ""
            arch: "arm64"

    runs-on: ${{ matrix.platform }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装系统依赖 (Ubuntu 专用)
        if: matrix.platform == 'ubuntu-22.04' || matrix.platform == 'ubuntu-22.04-arm'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils nasm

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Enable Corepack
        run: corepack enable

      - name: 安装 Rust 工具链 (默认目标)
        if: ${{ matrix.args == '' }}
        uses: dtolnay/rust-toolchain@stable

      - name: 安装 Rust 工具链 (macOS 目标)
        if: ${{ matrix.args != '' }}
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: 缓存 Rust 编译产物
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: 安装前端依赖 (pnpm)
        run: |
          corepack prepare pnpm@9.15.9 --activate
          pnpm install --frozen-lockfile

      - name: 保存工作目录路径
        id: workspace
        run: echo "path=$(pwd)" >> "$GITHUB_OUTPUT"

      - name: 构建并发布
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ needs.validate-tag.outputs.tag }}
          releaseName: "Sea Lantern v${{ needs.validate-tag.outputs.version }}"
          releaseBody: |
            ## 发布 Sea Lantern v${{ needs.validate-tag.outputs.version }}

            自动发布构建产物。
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: 上传 Ubuntu x64 构建产物 (用于 Arch 打包)
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu-build-x64
          path: |
            ${{ steps.workspace.outputs.path }}/target/release/bundle/pacman/*.pkg.tar.zst
            ${{ steps.workspace.outputs.path }}/target/release/bundle/deb/*_amd64.deb
            ${{ steps.workspace.outputs.path }}/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error

  build-arch-package:
    name: 上传 Arch 包到 Release
    needs: [validate-tag, publish-tauri]
    runs-on: ubuntu-22.04
    defaults:
      run:
        shell: bash

    steps:
      - name: 下载 Ubuntu x64 构建产物
        uses: actions/download-artifact@v4
        with:
          name: ubuntu-build-x64
          path: ./downloads

      - name: 查找 Arch 包
        run: |
          set -euo pipefail
          ARCH_PKG="$(find ./downloads -name '*.pkg.tar.zst' -type f | head -n 1)"
          if [ -z "$ARCH_PKG" ]; then
            echo "❌ 未找到 Arch .pkg.tar.zst 包文件"
            exit 1
          fi

          echo "✅ 找到 Arch 包: $ARCH_PKG"
          cp "$ARCH_PKG" ./

      - name: 上传 Arch 包到 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate-tag.outputs.tag }}
          files: |
            *.pkg.tar.*
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 上传 Arch 包作为构建产物
        uses: actions/upload-artifact@v4
        with:
          name: arch-package
          path: |
            *.pkg.tar.*
          if-no-files-found: error
