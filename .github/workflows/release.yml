name: "正式发布"

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "基础发布标签，必须是 vx.x.x（例如：v1.2.3）"
        required: true
        type: string
      channel:
        description: "发布渠道"
        required: true
        default: "stable"
        type: choice
        options:
          - stable
          - beta
      source_branch:
        description: "打标签的目标分支 HEAD"
        required: true
        default: "main"
        type: choice
        options:
          - main
          - beta
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-beta"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  actions: read

jobs:
  prepare-release:
    name: 准备发布标签并提取版本
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      release_name: ${{ steps.meta.outputs.release_name }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 手动触发时创建发布标签
        if: github.event_name == 'workflow_dispatch'
        env:
          BASE_TAG: ${{ inputs.tag }}
          CHANNEL: ${{ inputs.channel }}
          SOURCE_BRANCH: ${{ inputs.source_branch }}
        run: |
          set -euo pipefail

          if [[ ! "$BASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ 手动发布标签必须是 vx.x.x 格式: $BASE_TAG"
            exit 1
          fi

          case "$CHANNEL" in
            stable)
              RELEASE_TAG="$BASE_TAG"
              ;;
            beta)
              RELEASE_TAG="${BASE_TAG}-beta"
              ;;
            *)
              echo "❌ 不支持的发布渠道: $CHANNEL"
              exit 1
              ;;
          esac

          case "$SOURCE_BRANCH" in
            main|beta)
              ;;
            *)
              echo "❌ 不支持的打标签分支: $SOURCE_BRANCH"
              exit 1
              ;;
          esac

          git fetch origin "$SOURCE_BRANCH" --no-tags
          TARGET_SHA="$(git rev-parse "origin/${SOURCE_BRANCH}")"

          if git ls-remote --exit-code --tags origin "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "❌ 远端标签已存在: $RELEASE_TAG"
            exit 1
          fi

          git tag "$RELEASE_TAG" "$TARGET_SHA"
          git push origin "refs/tags/${RELEASE_TAG}"
          git checkout --detach "$TARGET_SHA"
          echo "✅ 已在 ${SOURCE_BRANCH} HEAD (${TARGET_SHA}) 创建标签: ${RELEASE_TAG}"

      - name: 校验主检查已通过
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const headSha = process.env.GITHUB_SHA;
            const requiredWorkflowName = '代码检查';

            const response = await github.rest.actions.listWorkflowRunsForRepo({
              owner,
              repo,
              head_sha: headSha,
              per_page: 20,
            });

            const passed = response.data.workflow_runs.some((run) =>
              run.name === requiredWorkflowName &&
              run.head_sha === headSha &&
              run.event === 'push' &&
              run.head_branch === 'main' &&
              run.status === 'completed' &&
              run.conclusion === 'success'
            );

            if (!passed) {
              core.setFailed(`❌ 提交 ${headSha} 尚未通过 main 分支上的 ${requiredWorkflowName}`);
              return;
            }

            core.info(`✅ 提交 ${headSha} 已通过 main 分支上的 ${requiredWorkflowName}`);

      - name: 提取版本信息
        id: meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_CHANNEL: ${{ inputs.channel }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            BASE_TAG="$INPUT_TAG"
            CHANNEL="$INPUT_CHANNEL"
            if [ "$CHANNEL" = "beta" ]; then
              TAG="${BASE_TAG}-beta"
            else
              TAG="$BASE_TAG"
            fi
          else
            TAG="${GITHUB_REF_NAME}"
            case "$TAG" in
              *-beta)
                BASE_TAG="${TAG%-beta}"
                CHANNEL="beta"
                ;;
              *)
                BASE_TAG="$TAG"
                CHANNEL="stable"
                ;;
            esac
          fi

          if [[ ! "$BASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ 发布标签必须是 vx.x.x 或 vx.x.x-beta 格式: $TAG"
            exit 1
          fi

          VERSION="${BASE_TAG#v}"
          RELEASE_NAME="Sea Lantern ${TAG}"
          PRERELEASE="false"
          if [ "$CHANNEL" = "beta" ]; then
            PRERELEASE="true"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "release_name=$RELEASE_NAME" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "✅ 发布标签: $TAG"
          echo "✅ 发布名称: $RELEASE_NAME"

  publish-tauri:
    name: 构建并发布桌面端
    needs: prepare-release
    permissions:
      contents: write
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
            asset_arch: "arm64"
          - platform: "macos-latest"
            args: "--target x86_64-apple-darwin"
            asset_arch: "x64"
          - platform: "ubuntu-22.04"
            args: ""
            arch: "amd64"
            asset_arch: "x64"
          - platform: "ubuntu-22.04-arm"
            args: ""
            arch: "arm64"
            asset_arch: "arm64"
          - platform: "windows-latest"
            args: ""
            arch: "amd64"
            asset_arch: "x64"
          - platform: "windows-11-arm"
            args: ""
            arch: "arm64"
            asset_arch: "arm64"

    runs-on: ${{ matrix.platform }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.tag }}

      - name: 安装系统依赖 (Ubuntu 专用)
        if: matrix.platform == 'ubuntu-22.04' || matrix.platform == 'ubuntu-22.04-arm'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils nasm

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Enable Corepack
        run: corepack enable

      - name: 缓存 pnpm 依赖
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('frontend/pnpm-lock.yaml', 'frontend/pnpm-workspace.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: 安装 Rust 工具链 (默认目标)
        if: ${{ matrix.args == '' }}
        uses: dtolnay/rust-toolchain@stable

      - name: 安装 Rust 工具链 (macOS 目标)
        if: ${{ matrix.args != '' }}
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: 缓存 Rust 编译产物
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: 安装前端依赖 (pnpm)
        run: |
          corepack prepare pnpm@11.5.3 --activate
          pnpm --dir frontend install --frozen-lockfile

      - name: 构建并发布
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ needs.prepare-release.outputs.tag }}
          releaseName: ${{ needs.prepare-release.outputs.release_name }}
          releaseBody: |
            ## 发布 ${{ needs.prepare-release.outputs.release_name }}

            自动发布构建产物。
          releaseDraft: true
          prerelease: ${{ needs.prepare-release.outputs.prerelease }}
          args: ${{ matrix.args }}
