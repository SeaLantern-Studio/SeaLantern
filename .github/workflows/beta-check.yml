name: "Beta 检查"

on:
  pull_request:
    branches: [beta]
  push:
    branches: [beta]

permissions:
  contents: read

concurrency:
  group: beta-check-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: 后端检查
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v4
        continue-on-error: true

      - name: 系统依赖
        id: apt_deps
        continue-on-error: true
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf nasm

      - name: Rust 工具链
        id: rust_setup
        uses: dtolnay/rust-toolchain@stable
        continue-on-error: true
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: 重试 Rust 工具链
        id: rust_setup_retry
        if: ${{ steps.rust_setup.outcome == 'failure' }}
        uses: dtolnay/rust-toolchain@stable
        continue-on-error: true
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Rust 缓存
        id: rust_cache
        uses: swatinem/rust-cache@v2
        continue-on-error: true
        with:
          workspaces: ". -> target"

      - name: Rust 格式
        id: rust_fmt
        continue-on-error: true
        run: cargo fmt --all -- --check

      - name: Rust 编译
        id: rust_check
        continue-on-error: true
        run: cargo check --workspace

      - name: Clippy
        id: rust_clippy
        continue-on-error: true
        run: cargo clippy --workspace -- -D warnings

      - name: Rust 测试
        id: rust_test
        continue-on-error: true
        run: cargo test --workspace

      - name: 总结
        if: always()
        run: |
          failed=0

          warn_if_failed() {
            step_name="$1"
            outcome="$2"
            message="$3"

            if [ "$outcome" != "success" ] && [ "$outcome" != "skipped" ]; then
              echo "::warning title=${step_name}::${message}"
              failed=1
            fi
          }

          warn_if_failed "Checkout" "${{ steps.checkout.outcome }}" "代码检出失败。"
          warn_if_failed "系统依赖" "${{ steps.apt_deps.outcome }}" "依赖安装失败。"
          if [ "${{ steps.rust_setup.outcome }}" != "success" ] && [ "${{ steps.rust_setup_retry.outcome }}" != "success" ]; then
            echo "::warning title=Rust 工具链::安装失败。"
            failed=1
          fi
          warn_if_failed "Rust 缓存" "${{ steps.rust_cache.outcome }}" "缓存失败。"
          warn_if_failed "Rust 格式" "${{ steps.rust_fmt.outcome }}" "格式检查未过。"
          warn_if_failed "Rust 编译" "${{ steps.rust_check.outcome }}" "编译检查未过。"
          warn_if_failed "Clippy" "${{ steps.rust_clippy.outcome }}" "Clippy 未过。"
          warn_if_failed "Rust 测试" "${{ steps.rust_test.outcome }}" "测试未过。"

          if [ "$failed" -eq 0 ]; then
            echo "后端检查通过。"
          else
            echo "::notice title=后端检查::有未通过项。"
            exit 1
          fi

  frontend:
    name: 前端检查
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v4
        continue-on-error: true

      - name: Node.js
        id: node_setup
        uses: actions/setup-node@v4
        continue-on-error: true
        with:
          node-version: "lts/*"

      - name: PNPM
        id: pnpm_setup
        continue-on-error: true
        run: |
          corepack enable
          corepack prepare pnpm@11.5.3 --activate

      - name: PNPM 缓存
        id: pnpm_cache
        uses: actions/cache@v4
        continue-on-error: true
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('frontend/pnpm-lock.yaml', 'frontend/pnpm-workspace.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: 前端依赖
        id: frontend_install
        continue-on-error: true
        run: pnpm --dir frontend install --frozen-lockfile

      - name: 前端格式
        id: frontend_fmt
        continue-on-error: true
        run: pnpm --dir frontend run fmt:check

      - name: 前端 Lint
        id: frontend_lint
        continue-on-error: true
        run: pnpm --dir frontend run lint

      - name: 前端构建
        id: frontend_build
        continue-on-error: true
        run: pnpm --dir frontend run build:check

      - name: 总结
        if: always()
        run: |
          failed=0

          warn_if_failed() {
            step_name="$1"
            outcome="$2"
            message="$3"

            if [ "$outcome" != "success" ] && [ "$outcome" != "skipped" ]; then
              echo "::warning title=${step_name}::${message}"
              failed=1
            fi
          }

          warn_if_failed "Checkout" "${{ steps.checkout.outcome }}" "代码检出失败。"
          warn_if_failed "Node.js" "${{ steps.node_setup.outcome }}" "Node.js 安装失败。"
          warn_if_failed "PNPM" "${{ steps.pnpm_setup.outcome }}" "PNPM 准备失败。"
          warn_if_failed "PNPM 缓存" "${{ steps.pnpm_cache.outcome }}" "缓存失败。"
          warn_if_failed "前端依赖" "${{ steps.frontend_install.outcome }}" "依赖安装失败。"
          warn_if_failed "前端格式" "${{ steps.frontend_fmt.outcome }}" "格式检查未过。"
          warn_if_failed "前端 Lint" "${{ steps.frontend_lint.outcome }}" "Lint 未过。"
          warn_if_failed "前端构建" "${{ steps.frontend_build.outcome }}" "构建检查未过。"

          if [ "$failed" -eq 0 ]; then
            echo "前端检查通过。"
          else
            echo "::notice title=前端检查::有未通过项。"
            exit 1
          fi
