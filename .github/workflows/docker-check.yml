name: "Docker 构建检查"

on:
  pull_request:
    branches: [main, dev]
    paths:
      - "docker/Dockerfile"
      - "docker/docker-compose.yml"
      - "src-tauri/**"
      - "src/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/docker-check.yml"
  push:
    branches: [main, dev]
    paths:
      - "docker/Dockerfile"
      - "docker/docker-compose.yml"
      - "src-tauri/**"
      - "src/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/docker-check.yml"

concurrency:
  group: docker-check-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  docker-build:
    name: Docker 镜像构建测试
    runs-on: ubuntu-24.04
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 构建 Docker 镜像（测试构建）
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          push: false
          load: false
          build-args: |
            CARGO_FEATURES=docker
          cache-from: type=gha
          cache-to: type=gha,mode=max
