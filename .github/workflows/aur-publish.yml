name: "同步到AUR"

on:
  release:
    types: [published]

concurrency:
  group: aur-publish-${{ github.event.release.tag_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  aur-publish:
    name: 发布到 AUR
    if: ${{ !github.event.release.prerelease }}
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    container:
      image: archlinux:latest
      options: --user root

    steps:
      - name: 安装依赖
        run: |
          set -euo pipefail
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Syu --noconfirm base-devel git sudo openssh

          useradd -m builder
          echo 'builder ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers

      - name: 检出仓库代码
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0

      - name: 提取版本信息
        id: meta
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          VERSION="$(echo "$RELEASE_TAG" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -n 1)"
          if [ -z "$VERSION" ]; then
            echo "❌ 无法从 tag 提取版本号: $RELEASE_TAG"
            exit 1
          fi
          echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "✅ 发布版本: $VERSION"

      - name: 更新 PKGBUILD 版本
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          set -euo pipefail
          cp packaging/PKGBUILD packaging/PKGBUILD.bak
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" packaging/PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" packaging/PKGBUILD
          sed -i "s|releases/download/v\${pkgver}/|releases/download/${TAG}/|" packaging/PKGBUILD

      - name: 生成 .SRCINFO
        run: |
          set -euo pipefail
          chown -R builder:builder packaging
          cd packaging && sudo -u builder makepkg --printsrcinfo > .SRCINFO

      - name: 发布到 AUR
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.3
        with:
          pkgname: sealantern
          pkgbuild: packaging/PKGBUILD
          assets: |
            packaging/.SRCINFO
            packaging/sealantern.desktop
            packaging/sealantern.install
          commit_username: "${{ github.actor }}"
          commit_email: "${{ github.actor }}@users.noreply.github.com"
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "chore(release): 发布 sealantern v${{ steps.meta.outputs.version }}"
          allow_empty_commits: false
          force_push: false
          updpkgsums: false

      - name: 清理
        if: always()
        run: |
          [ -f "packaging/PKGBUILD.bak" ] && mv -f packaging/PKGBUILD.bak packaging/PKGBUILD || true
