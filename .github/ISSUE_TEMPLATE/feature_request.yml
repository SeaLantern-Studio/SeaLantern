name: Request for New Feature | 新功能请求
description: Request to add a new feature | 请求添加新功能
title: "[Feature] "
labels: ["enhancement", "pending"]
assignees: []
body:
  - type: textarea
    id: description
    attributes:
      label: Feature Description | 功能描述
      description: What feature do you want? | 你想要什么功能？
      placeholder: What feature do you want? | 你想要什么功能？
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Reason | 理由
      description: Explain why you want this feature | 说明你为什么想要这个功能
      placeholder: Explain why you want this feature | 说明你为什么想要这个功能
    validations:
      required: false

  - type: textarea
    id: implementation
    attributes:
      label: Implementation Details | 实现细节
      description: Optional - How would you like to implement this feature? | 可选 - 你想要如何实现这个功能？
      placeholder: How would you like to implement this feature? | 你想要如何实现这个功能？
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives | 替代方案
      description: Optional - Are there any alternative solutions? | 可选 - 是否有其他替代方案？
      placeholder: Are there any alternative solutions? | 是否有其他替代方案？
    validations:
      required: false

  - type: textarea
    id: impact
    attributes:
      label: Impact | 影响
      description: Optional - Does this feature have any impact on existing content? | 可选 - 这个功能是否会对现有内容产生影响？
      placeholder: Does this feature have any impact on existing content? | 这个功能是否会对现有内容产生影响？
    validations:
      required: false

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria | 验收标准
      description: Optional - Under what conditions would you consider this feature complete? | 可选 - 什么样的情况下才算是完成这个功能？
      placeholder: Under what conditions would you consider this feature complete? | 什么样的情况下才算是完成这个功能？
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Notes | 其他信息
      description: Optional - For example, sketches of the UI | 可选 - 例如界面的草图
      placeholder: Optional - For example, sketches of the UI | 可选 - 例如界面的草图
    validations:
      required: false
