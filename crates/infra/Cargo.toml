[package]
name = "sealantern-infra"
version = "0.1.0"
edition = "2021"
license = "GPL-3.0-only"

[lib]
path = "src/lib.rs"

[features]
default = []
blocking = ["reqwest/blocking"]

[dependencies]
reqwest = { version = "0.12", features = ["json", "stream"] }
tracing = "0.1"
tokio = { version = "1", features = ["fs", "io-util", "rt", "rt-multi-thread", "macros", "time"] }
tokio-util = { version = "0.7", features = ["io"] }
futures = "0.3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
