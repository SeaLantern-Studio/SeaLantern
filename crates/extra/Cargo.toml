[package]
name = "sealantern-extra"
version = "0.1.0"
edition = "2021"
license = "GPL-3.0-only"

[lib]
path = "src/lib.rs"

[dependencies]
tracing = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
async-trait = "0.1"
tokio = { version = "1", features = ["rt", "rt-multi-thread", "macros", "fs"] }
urlencoding = "2"
sealantern-infra = { path = "../infra" }
